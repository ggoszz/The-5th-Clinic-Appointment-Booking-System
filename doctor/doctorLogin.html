<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Aileron&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Aileron', sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #e6f2ff; 
    }
    h1 {
      font-family: 'Arvo', serif;
      font-size: 2em;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .confirmation h1 {
      margin-top: 0;
    }
    form {
      margin: 20px auto;
      max-width: 400px;
      text-align: left;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .button {
      padding: 10px 20px;
      background-color: #003366;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin: 10px auto;
      display: block;
    }
    .button:hover {
      background-color: #002244; 
    }
    .confirmation {
      display: none;
    }
    .board-header {
      margin-bottom: 50px;
    }
    .board-header p {
      color: #555;
      font-size: 1.2em;
    }
    .form-row {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="board-header">
    <h1>Doctor Login</h1>
  </div>
  
  <form id="doctorLoginForm">
    <div class="form-row">
      <label>You are...</label>
      <select id="doctor" required>
        <option value="">-- Select Doctor --</option>
        <option value="Alice Moore">Alice Moore</option>
        <option value="Marcus Turner">Marcus Turner</option>
        <option value="Priya Shah">Priya Shah</option>
        <option value="James Rodriguez">James Rodriguez</option>
        <option value="Grace Bennett">Grace Bennett</option>
      </select>
    </div>

    <div class="form-row">
      <label for="doctorId">Doctor ID:</label>
      <input type="text" id="doctorId" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="button">Login</button>
    </div>
  </form>
    
  <script>
    fetch('/components/header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });

    document.getElementById('doctorLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'doctorViewAppointment.html'; 
    });
  </script>
</body>
</html>
