<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Aileron&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Aileron', sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #e6f2ff; 
    }
    h1 {
      font-family: 'Arvo', serif;
      font-size: 2em;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .confirmation h1 {
      margin-top: 0;
    }
    form {
      margin: 20px auto;
      max-width: 400px;
      text-align: left;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .button {
      padding: 10px 20px;
      background-color: #003366; 
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin: 10px auto;
      display: block;
    }
    .button:hover {
      background-color: #002244; 
    }
    .confirmation {
      display: none;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="pageHeader">
    <h1>Patient Registration</h1>
    <p style="margin: 20px 0;">- OR -</p>
      <button type="button" class="button" onclick="showLoginForm()">Existing Patient Login</button>
  </div>
  <form id="registrationForm" onsubmit="return handleRegistration(event)">
    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" required>

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" required>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" required>

    <label for="gender">Gender:</label>
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="F">Female</option>
      <option value="M">Male</option>
    </select>

    <label for="address">Address:</label>
    <input type="text" id="address" required>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="insuranceName">Insurance Name:</label>
    <input type="text" id="insuranceName" required>

    <label for="insuranceId">Insurance ID:</label>
    <input type="text" id="insuranceId" required>

    <div style="text-align: center;">
      <button type="submit" class="button">Register</button>
    </div>
  </form>

  <div class="confirmation" id="confirmation">
    <h1>Registration Successful</h1>
    <p>Your Patient ID: <span id="patientId"></span></p>
    <button class="button" onclick="showLoginForm()">Existing Patient Login</button>
  </div>

  <div class="login" id="loginForm" style="display:none;">
    <h1>Existing Patient Login</h1>
    <form onsubmit="return handleLogin(event)">
      <label for="loginFirstName">First Name:</label>
      <input type="text" id="loginFirstName" required>

      <label for="loginLastName">Last Name:</label>
      <input type="text" id="loginLastName" required>

      <label for="loginPatientId">Patient ID:</label>
      <input type="text" id="loginPatientId" required>

      <label for="loginDob">Date of Birth:</label>
      <input type="date" id="loginDob" required>

      <div style="text-align: center;">
        <button type="submit" class="button">Login</button>
      </div>
    </form>
  </div>

  <script>
     fetch('/components/header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });
    let patientIdCounter = 1; // Simulating a Patient ID counter

    function handleRegistration(event) {
      event.preventDefault();
      const patientId = patientIdCounter++;
      document.getElementById('patientId').innerText = patientId;
      document.getElementById('registrationForm').style.display = 'none';
      document.getElementById('pageHeader').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    }

    function showLoginForm() {
      document.getElementById('registrationForm').style.display = 'none';
      document.getElementById('confirmation').style.display = 'none';
      document.getElementById('pageHeader').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }

    function handleLogin(event) {
      event.preventDefault();
      window.location.href = 'patientDashboard.html'; 
    }
  </script>
</body>
</html>
